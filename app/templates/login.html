{% extends "base.html" %}
{% block title %}WaniFi · Log in{% endblock %}
{% block body_class %} flex items-center justify-center relative overflow-hidden{% endblock %}
{% block body %}

<!-- Ambient background glows -->
<div class="absolute inset-0 pointer-events-none">
  <div class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-blue-600/10 rounded-full blur-3xl"></div>
  <div class="absolute bottom-1/3 left-1/3 w-64 h-64 bg-sky-500/8 rounded-full blur-3xl"></div>
</div>

<div class="relative w-full max-w-sm px-4 flex flex-col items-center gap-6">

  <!-- Logo above card -->
  <div class="flex flex-col items-center gap-3">
    <div class="w-16 h-16 rounded-2xl overflow-hidden shadow-2xl shadow-blue-900/40 ring-1 ring-white/10">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="36" height="36" rx="9" fill="#1e3a5f"/>
        <rect width="36" height="36" rx="9" fill="url(#lg-login)"/>
        <text x="18" y="26" font-family="Arial Black, sans-serif" font-size="21" font-weight="900" fill="white" text-anchor="middle" opacity="0.95">W</text>
        <defs>
          <linearGradient id="lg-login" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1d4ed8"/>
            <stop offset="100%" stop-color="#0ea5e9"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="text-center">
      <h1 class="text-2xl font-black tracking-tight text-slate-100">WaniFi</h1>
      <p class="text-sm text-slate-500 mt-0.5">Failover handled.</p>
    </div>
  </div>

  <!-- Card -->
  <div class="w-full bg-slate-900/80 backdrop-blur border border-slate-700/50 rounded-2xl shadow-2xl overflow-hidden">
    <div class="h-px bg-gradient-to-r from-transparent via-blue-500 to-transparent opacity-60"></div>
    <div class="p-6">

      <div x-data="{
        pw: '', err: '', busy: false,
        async submit() {
          if (this.busy) return;
          this.busy = true; this.err = '';
          try {
            const fd = new FormData();
            fd.append('password', this.pw);
            const r = await fetch('/login', { method: 'POST', body: fd });
            const d = await r.json().catch(() => ({}));
            if (r.ok && d.ok) { location.replace('/'); return; }
            this.err = d.error || 'Invalid password';
          } catch { this.err = 'Connection error'; }
          this.busy = false;
        }
      }" @keydown.enter.window="submit()">

        <div x-show="err" x-cloak class="mb-5 flex items-center gap-2.5 p-3 bg-red-500/10 border border-red-500/25 rounded-xl">
          <svg class="w-4 h-4 text-red-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span class="text-sm text-red-300" x-text="err"></span>
        </div>

        <div class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
            <input type="password" x-model="pw" autofocus autocomplete="current-password"
                   class="w-full bg-slate-800/80 border border-slate-700/70 rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500/60 focus:border-blue-500/40 transition-all">
          </div>
          <button @click="submit()" :disabled="busy"
                  class="w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700 disabled:opacity-60 text-white font-semibold rounded-xl py-3 transition-colors text-sm tracking-wide shadow-lg shadow-blue-900/30"
                  x-text="busy ? 'Logging in…' : 'Log in'">Log in
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Version -->
  <p class="text-xs text-slate-700">v{{ version }}</p>

</div>
{% endblock %}
