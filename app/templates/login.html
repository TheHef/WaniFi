{% extends "base.html" %}
{% block title %}WaniFi · Log in{% endblock %}
{% block body_class %} flex items-center justify-center{% endblock %}
{% block body %}
<div class="w-full max-w-sm px-4">
  <div class="bg-slate-900 border border-slate-700/60 rounded-2xl shadow-2xl overflow-hidden">
    <div class="h-1 bg-gradient-to-r from-blue-600 to-sky-400"></div>
    <div class="p-6">
      <div class="flex flex-col items-center mb-6">
        <div class="flex items-center gap-3 mb-1">
          <div class="w-10 h-10 rounded-xl overflow-hidden shadow-lg shrink-0">
            <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="36" height="36" rx="9" fill="#1e3a5f"/>
              <rect width="36" height="36" rx="9" fill="url(#lg)"/>
              <text x="18" y="26" font-family="Arial Black, sans-serif" font-size="21" font-weight="900" fill="white" text-anchor="middle" opacity="0.95">W</text>
              <defs>
                <linearGradient id="lg" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#1d4ed8"/>
                  <stop offset="100%" stop-color="#0ea5e9"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h1 class="text-2xl font-bold tracking-tight">WaniFi</h1>
        </div>
        <p class="text-sm text-slate-400">Failover handled.</p>
      </div>

      <div class="border-t border-slate-700/60 mb-5"></div>

      {% if error %}
      <div class="mb-5 p-3 bg-red-500/15 border border-red-500/30 rounded-lg text-red-300 text-sm text-center">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Admin password</label>
          <input type="password" name="password" required autofocus autocomplete="current-password"
                 class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
        </div>
        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-semibold rounded-lg py-2.5 transition-colors text-sm tracking-wide">
          Log in
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
