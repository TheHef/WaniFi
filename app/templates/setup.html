{% extends "base.html" %}
{% block title %}WaniFi · Setup{% endblock %}
{% block body_class %} flex items-center justify-center{% endblock %}
{% block body %}
<div class="w-full max-w-sm px-4" x-data="{
    password: '', confirm: '', error: '', loading: false,
    async submit() {
      this.error = '';
      if (this.password.length < 8) { this.error = 'Password must be at least 8 characters'; return; }
      if (this.password !== this.confirm) { this.error = 'Passwords do not match'; return; }
      this.loading = true;
      try {
        const r = await fetch('/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: this.password }),
        });
        const d = await r.json().catch(() => ({}));
        if (r.ok && d.ok) {
          location.href = '/';
          return;
        }
        this.error = d.error || d.detail || 'Setup failed';
      } catch (e) { this.error = String(e); }
      this.loading = false;
    }
  }" x-cloak>
  <div class="bg-slate-900 border border-slate-700/60 rounded-2xl shadow-2xl overflow-hidden">
    <div class="h-1 bg-gradient-to-r from-emerald-500 to-sky-400"></div>
    <div class="p-6">
      <div class="flex flex-col items-center mb-6">
        <div class="flex items-center gap-3 mb-1">
          <div class="w-10 h-10 rounded-xl overflow-hidden shadow-lg shrink-0">
            <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="36" height="36" rx="9" fill="#1e3a5f"/>
              <rect width="36" height="36" rx="9" fill="url(#lg2)"/>
              <text x="18" y="26" font-family="Arial Black, sans-serif" font-size="21" font-weight="900" fill="white" text-anchor="middle" opacity="0.95">W</text>
              <defs>
                <linearGradient id="lg2" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#10b981"/>
                  <stop offset="100%" stop-color="#0ea5e9"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h1 class="text-2xl font-bold tracking-tight">Welcome to WaniFi</h1>
        </div>
        <p class="text-sm text-slate-400">Set an admin password to get started.</p>
      </div>

      <div class="border-t border-slate-700/60 mb-5"></div>

      <template x-if="error">
        <div class="mb-4 p-3 bg-red-500/15 border border-red-500/30 rounded-lg text-red-300 text-sm text-center" x-text="error"></div>
      </template>

      <form @submit.prevent="submit()" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">New password</label>
          <input type="password" x-model="password" required autofocus autocomplete="new-password" minlength="8"
                 class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Confirm password</label>
          <input type="password" x-model="confirm" required autocomplete="new-password" minlength="8"
                 class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition">
        </div>
        <button type="submit" :disabled="loading"
                class="w-full bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-700 disabled:text-slate-500 text-white font-semibold rounded-lg py-2.5 transition-colors text-sm tracking-wide"
                x-text="loading ? 'Setting up…' : 'Create account'"></button>
      </form>
    </div>
  </div>
</div>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
{% endblock %}
