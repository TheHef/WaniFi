<section x-show="tab === 'rules'">  <div class="bg-slate-900 border border-slate-700/60 rounded-2xl p-5 mb-4">
    <h2 class="text-base font-semibold text-slate-200 mb-4">Add rule</h2>

    <div class="flex flex-wrap gap-2 mb-4">
      <button x-show="integrations.host_command"
              @click="newRule.rule_type = 'host_command'; newRule.action = ''; newRule.container = ''"
              class="px-3 py-1.5 rounded-lg text-xs font-semibold border transition"
              :class="newRule.rule_type === 'host_command' ? 'bg-red-500/20 border-red-500/50 text-red-300' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        Host Command
      </button>
      <button x-show="integrations.docker"
              @click="newRule.rule_type = 'docker'; newRule.action = 'stop'; newRule.container = ''"
              class="px-3 py-1.5 rounded-lg text-xs font-semibold border transition"
              :class="newRule.rule_type === 'docker' ? 'bg-[#248CEF]/20 border-[#248CEF]/50 text-[#248CEF]' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        Docker
      </button>
      <button x-show="integrations.qb"
              @click="newRule.rule_type = 'qbittorrent'; newRule.action = 'alt_speed_on'; newRule.container = ''"
              class="px-3 py-1.5 rounded-lg text-xs font-semibold border transition"
              :class="newRule.rule_type === 'qbittorrent' ? 'bg-[#65A5E9]/20 border-[#65A5E9]/50 text-[#65A5E9]' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        qBittorrent
      </button>
      <button x-show="integrations.sabnzbd"
              @click="newRule.rule_type = 'sabnzbd'; newRule.action = 'pause'; newRule.container = ''"
              class="px-3 py-1.5 rounded-lg text-xs font-semibold border transition"
              :class="newRule.rule_type === 'sabnzbd' ? 'bg-[#F5A623]/20 border-[#F5A623]/50 text-[#F5A623]' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        SABnzbd
      </button>
      <button x-show="integrations.transmission"
              @click="newRule.rule_type = 'transmission'; newRule.action = 'alt_speed_on'; newRule.container = ''"
              class="px-3 py-1.5 rounded-lg text-xs font-semibold border transition"
              :class="newRule.rule_type === 'transmission' ? 'bg-[#C33B2E]/20 border-[#C33B2E]/50 text-[#C33B2E]' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">

      </button>
      <button x-show="integrations.deluge"
              @click="newRule.rule_type = 'deluge'; newRule.action = 'set_dl_limit'; newRule.container = ''"

        Deluge
      </button>
      <button x-show="integrations.emby"
              @click="newRule.rule_type = 'emby'; newRule.action = 'set_bitrate_limit'; newRule.container = ''"

              :class="newRule.rule_type === 'emby' ? 'bg-[#52B54B]/20 border-[#52B54B]/50 text-[#52B54B]' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        Emby
      </button>
      <button x-show="integrations.jellyfin"
              @click="newRule.rule_type = 'jellyfin'; newRule.action = 'set_bitrate_limit'; newRule.container = ''"
              class="px-3 py-1.5 rounded-lg text-xs font-semibold border transition"
              :class="newRule.rule_type === 'jellyfin' ? 'bg-[#AA5CC3]/20 border-[#AA5CC3]/50 text-[#AA5CC3]' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        Jellyfin
      </button>
      <button x-show="integrations.plex"
              @click="newRule.rule_type = 'plex'; newRule.action = 'set_wan_bitrate'; newRule.container = ''"
              class="px-3 py-1.5 rounded-lg text-xs font-semibold border transition"
              :class="newRule.rule_type === 'plex' ? 'bg-[#E5A00D]/20 border-[#E5A00D]/50 text-[#E5A00D]' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        Plex
      </button>
      <button x-show="integrations.homeassistant"
              @click="newRule.rule_type = 'homeassistant'; newRule.action = 'call_webhook'; newRule.container = ''"
              class="px-3 py-1.5 rounded-lg text-xs font-semibold border transition"
              :class="newRule.rule_type === 'homeassistant' ? 'bg-[#18BCF2]/20 border-[#18BCF2]/50 text-[#18BCF2]' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">

      </button>

              :class="newRule.rule_type === 'proxmox' ? 'bg-[#E57000]/20 border-[#E57000]/50 text-[#E57000]' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        Proxmox
      </button>
      <button x-show="integrations.sonarr"
              @click="newRule.rule_type = 'sonarr'; newRule.action = 'disable_indexers'; newRule.container = ''"

              :class="newRule.rule_type === 'sonarr' ? 'bg-[#35C5F4]/20 border-[#35C5F4]/50 text-[#35C5F4]' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        Sonarr
      </button>
      <button x-show="integrations.radarr"
              @click="newRule.rule_type = 'radarr'; newRule.action = 'disable_indexers'; newRule.container = ''"

              :class="newRule.rule_type === 'radarr' ? 'bg-[#FFC230]/20 border-[#FFC230]/50 text-[#FFC230]' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        Radarr
      </button>
      <button x-show="integrations.webhook" @click="newRule.rule_type = 'webhook'; newRule.action = 'send'; newRule.container = 'POST'"

              :class="newRule.rule_type === 'webhook' ? 'bg-slate-600/40 border-slate-500/50 text-slate-300' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        Webhook
      </button>
      <button x-show="integrations.pihole"

    <!-- Docker -->

        </template>
      </select>
      <select x-model="newRule.trigger" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-[#248CEF]">

        <option value="restored">On restored</option>
        <option value="down">On WAN down</option>
        <option value="high_latency">On high latency</option>
      </select>

        <option value="start">Start</option>
        <option value="restart">Restart</option>
        <option value="pause">Pause</option>
        <option value="unpause">Unpause</option>
      </select>

    </div>

        <option value="down">On WAN down</option>
        <option value="high_latency">On high latency</option>

        <option value="start_vm">Start VM</option>
        <option value="pause_vm">Pause VM</option>
        <option value="resume_vm">Resume VM</option>
      </select>
      <input x-model="newRule.container" type="text" placeholder="VM name"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-amber-500 transition">
      <input x-model="newRule.name" type="text" placeholder="Name (optional)"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-amber-500 transition">
      <button @click="addRule()" class="md:col-span-4 bg-amber-600 hover:bg-amber-500 text-white font-semibold rounded-xl px-4 py-2 text-sm transition"><svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 inline-block mr-1.5 -mt-0.5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>Add rule</button>
    </div>

    <!-- Node-RED -->
    <div x-show="newRule.rule_type === 'nodered'" class="grid md:grid-cols-4 gap-3">
      <select x-model="newRule.trigger" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-rose-500">
        <option value="failover">On failover</option>
        <option value="restored">On restored</option>
        <option value="down">On WAN down</option>
        <option value="high_latency">On high latency</option>
      </select>
      <input x-model="newRule.command" type="text" placeholder="Flow endpoint (e.g. /failover)"
             class="md:col-span-2 bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm font-mono text-slate-200 placeholder-slate-600 focus:outline-none focus:border-rose-500 transition">
      <input x-model="newRule.name" type="text" placeholder="Name (optional)"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-rose-500 transition">
      <button @click="addRule()" class="md:col-span-4 bg-rose-700 hover:bg-rose-600 text-white font-semibold rounded-xl px-4 py-2 text-sm transition"><svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 inline-block mr-1.5 -mt-0.5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>Add rule</button>
    </div>

    <!-- NZBGet -->
    <div x-show="newRule.rule_type === 'nzbget'" class="grid md:grid-cols-4 gap-3">
      <select x-model="newRule.trigger" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-slate-500">
        <option value="failover">On failover</option>
        <option value="restored">On restored</option>
        <option value="down">On WAN down</option>
        <option value="high_latency">On high latency</option>
      </select>
      <select x-model="newRule.action" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-slate-500">
        <option value="pause">Pause downloads</option>
        <option value="resume">Resume downloads</option>
        <option value="set_speed_limit">Set speed limit</option>
      </select>
      <input x-show="newRule.action === 'set_speed_limit'"
             x-model="newRule.container" type="number" min="0" placeholder="KB/s (0 = unlimited)"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-slate-500 transition">
      <input x-model="newRule.name" type="text" placeholder="Name (optional)"
             :class="newRule.action === 'set_speed_limit' ? '' : 'md:col-span-2'"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-slate-500 transition">
      <button @click="addRule()" class="md:col-span-4 bg-slate-600 hover:bg-slate-500 text-white font-semibold rounded-xl px-4 py-2 text-sm transition"><svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 inline-block mr-1.5 -mt-0.5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>Add rule</button>
    </div>
  </div>

  <div class="bg-slate-900 border border-slate-700/60 rounded-2xl overflow-hidden mb-4">

    <!-- Empty state -->
    <div x-show="rules.length === 0" class="flex flex-col items-center justify-center py-14 text-center px-6">
      <div class="w-12 h-12 rounded-2xl bg-slate-800 border border-slate-700 flex items-center justify-center mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
      </div>
      <p class="text-slate-400 font-semibold">No rules yet</p>
      <p class="text-slate-600 text-sm mt-1">Pick an integration above and add your first automation rule</p>
    </div>

    <table x-show="rules.length > 0" class="w-full text-sm">
      <thead class="text-[11px] font-semibold text-slate-500 uppercase tracking-widest bg-slate-950/60 border-b border-slate-800">
        <tr>
          <th class="w-8 py-3.5"></th>
          <th class="text-left pl-4 pr-3 py-3.5 w-20">Type</th>
          <th class="text-left pl-4 pr-6 py-3.5">Rule</th>
          <th class="text-left px-4 py-3.5">Trigger</th>
          <th class="text-left px-4 py-3.5">Action</th>
          <th class="text-center px-4 py-3.5 w-20">Active</th>
          <th class="w-28 py-3.5"></th>
        </tr>
      </thead>
      <tbody>
        <template x-for="(r, index) in rules" :key="r.id">
          <tr class="border-t border-slate-800/70 transition-all duration-100 select-none"
              :class="dragOverIndex === index && dragSrcIndex !== index ? 'bg-blue-500/8 border-t-blue-500/30' : 'hover:bg-white/[0.02]'"
              draggable="true"
              @dragstart="dragSrcIndex = index; $event.dataTransfer.effectAllowed = 'move'"
              @dragover.prevent="dragOverIndex = index; $event.dataTransfer.dropEffect = 'move'"
              @dragleave="dragOverIndex = null"
              @drop.prevent="reorderRules(dragSrcIndex, index); dragSrcIndex = null; dragOverIndex = null"
              @dragend="dragSrcIndex = null; dragOverIndex = null">

            <!-- Drag handle -->
            <td class="pl-2 pr-1 py-4 text-center" :class="!r.enabled ? 'opacity-40' : ''">
              <span class="cursor-grab active:cursor-grabbing text-slate-700 hover:text-slate-500 transition-colors inline-block">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 16 16" fill="currentColor">
                  <circle cx="5" cy="3.5" r="1.3"/><circle cx="5" cy="8" r="1.3"/><circle cx="5" cy="12.5" r="1.3"/>
                  <circle cx="11" cy="3.5" r="1.3"/><circle cx="11" cy="8" r="1.3"/><circle cx="11" cy="12.5" r="1.3"/>
                </svg>
              </span>
            </td>

            <!-- Type badge -->
            <td class="pl-4 pr-3 py-4" :class="!r.enabled ? 'opacity-40' : ''">
              <span class="inline-block px-2 py-0.5 rounded-md text-[11px] font-bold whitespace-nowrap tracking-wide"
                    :style="({
                      host_command: 'background:rgba(239,68,68,.15);color:#f87171',
                      docker:       'background:rgba(36,140,239,.15);color:#248CEF',
                      qbittorrent:  'background:rgba(101,165,233,.15);color:#65A5E9',
                      sabnzbd:      'background:rgba(245,166,35,.15);color:#F5A623',
                      transmission: 'background:rgba(195,59,46,.15);color:#C33B2E',
                      deluge:       'background:rgba(136,176,75,.15);color:#88B04B',
                      emby:         'background:rgba(82,181,75,.15);color:#52B54B',
                      jellyfin:     'background:rgba(170,92,195,.15);color:#AA5CC3',
                      plex:         'background:rgba(229,160,13,.15);color:#E5A00D',
                      homeassistant:'background:rgba(24,188,242,.15);color:#18BCF2',
                      proxmox:      'background:rgba(229,112,0,.15);color:#E57000',
                      sonarr:       'background:rgba(53,197,244,.15);color:#35C5F4',
                      radarr:       'background:rgba(255,194,48,.15);color:#FFC230',
                      webhook:      'background:rgba(100,116,139,.15);color:#94a3b8',
                      pihole:       'background:rgba(239,68,68,.15);color:#f87171',
                      adguard:      'background:rgba(34,197,94,.15);color:#4ade80',
                      portainer:    'background:rgba(6,182,212,.15);color:#22d3ee',
                      truenas:      'background:rgba(99,102,241,.15);color:#a5b4fc',
                      unraid:       'background:rgba(245,158,11,.15);color:#fbbf24',
                      nodered:      'background:rgba(244,63,94,.15);color:#fb7185',
                      nzbget:       'background:rgba(100,116,139,.15);color:#94a3b8',
                    })[r.rule_type] || 'background:rgba(71,85,105,.4);color:#94a3b8'"
                    x-text="({
                      host_command:'HC', docker:'DC', qbittorrent:'qb',
                      sabnzbd:'SAB', transmission:'TR', deluge:'DL',
                      emby:'Emby', jellyfin:'JF', plex:'Plex',
                      homeassistant:'HA', proxmox:'PVE',
                      sonarr:'Sonarr', radarr:'Radarr', webhook:'Hook',
                      pihole:'Pi-hole', adguard:'AdG',
                      portainer:'PTR', truenas:'TrueNAS', unraid:'Unraid',
                      nodered:'NR', nzbget:'NZB',
                    })[r.rule_type] || r.rule_type">
              </span>
            </td>

            <!-- Rule name + subtitle -->
            <td class="pl-4 pr-6 py-4" :class="!r.enabled ? 'opacity-40' : ''">
              <div class="font-semibold text-slate-100 leading-tight text-[13px]"
                   x-text="r.name || r.rule_type"></div>
              <div class="text-[11px] text-slate-500 font-mono mt-0.5 truncate max-w-[200px]"
                   x-text="r.rule_type === 'host_command' || r.rule_type === 'webhook' ? r.command : ['docker','proxmox','portainer','homeassistant','nodered'].includes(r.rule_type) ? (r.container || r.action) : r.action"></div>
            </td>

            <!-- Trigger badge -->
            <td class="px-4 py-4" :class="!r.enabled ? 'opacity-40' : ''">
              <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-semibold whitespace-nowrap ring-1 ring-inset"
                    :class="{
                      'bg-amber-500/10   text-amber-300   ring-amber-500/20':   r.trigger === 'failover',
                      'bg-emerald-500/10 text-emerald-300 ring-emerald-500/20': r.trigger === 'restored',
                      'bg-red-500/10     text-red-300     ring-red-500/20':     r.trigger === 'down',
                      'bg-yellow-500/10  text-yellow-300  ring-yellow-500/20':  r.trigger === 'high_latency',
                    }">
                <span class="w-1.5 h-1.5 rounded-full shrink-0"
                      :class="{
                        'bg-amber-400':   r.trigger === 'failover',
                        'bg-emerald-400': r.trigger === 'restored',
                        'bg-red-400':     r.trigger === 'down',
                        'bg-yellow-400':  r.trigger === 'high_latency',
                      }"></span>
                <span x-text="({failover:'Failover', restored:'Restored', down:'WAN down', high_latency:'High latency'})[r.trigger] || r.trigger"></span>
              </span>
            </td>

            <!-- Action badge -->
            <td class="px-4 py-4" :class="!r.enabled ? 'opacity-40' : ''">
              <span class="inline-flex items-center bg-slate-800 border border-slate-700/50 rounded-lg px-2.5 py-1 text-[11px] font-mono text-slate-300"
                    x-text="r.action + (r.container && !['docker','homeassistant','proxmox','webhook','portainer','nodered'].includes(r.rule_type) ? ' · ' + r.container : '')">
              </span>
            </td>

            <!-- Toggle -->
            <td class="px-4 py-4 text-center">
              <button @click="toggleRule(r.id)"
                      class="relative w-9 h-5 rounded-full transition-colors duration-200 focus:outline-none"
                      :class="r.enabled ? 'bg-emerald-500' : 'bg-slate-700'">
                <span class="absolute top-[3px] w-[14px] h-[14px] rounded-full bg-white shadow-sm flex items-center justify-center transition-all duration-200"
                      :class="r.enabled ? 'left-[18px]' : 'left-[3px]'">
                  <svg x-show="r.enabled" class="w-2 h-2 text-emerald-500" viewBox="0 0 10 8" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 4l2.5 2.5L9 1"/>
                  </svg>
                  <svg x-show="!r.enabled" class="w-1.5 h-1.5 text-slate-400" viewBox="0 0 8 8" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <path d="M1 1l6 6M7 1L1 7"/>
                  </svg>
                </span>
              </button>
            </td>

            <!-- Run · Edit · Delete -->
            <td class="px-3 py-4">
              <div class="flex items-center justify-end gap-0.5">
                <button @click="runRule(r.id)"
                        :title="runMsg && runMsg.id === r.id ? runMsg.text : 'Run now'"
                        :class="runMsg && runMsg.id === r.id
                          ? (runMsg.ok ? 'text-emerald-400 bg-emerald-500/15' : 'text-red-400 bg-red-500/15')
                          : 'text-slate-600 hover:text-emerald-400 hover:bg-emerald-500/10'"
                        class="w-7 h-7 inline-flex items-center justify-center rounded-lg transition-all duration-200">
                  <svg x-show="!runMsg || runMsg.id !== r.id" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/>
                  </svg>
                  <svg x-show="runMsg && runMsg.id === r.id && runMsg.ok" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                  </svg>
                  <svg x-show="runMsg && runMsg.id === r.id && !runMsg.ok" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                  </svg>
                </button>
                <button @click="editRule(r.id)"
                        class="w-7 h-7 inline-flex items-center justify-center rounded-lg text-slate-600 hover:text-blue-400 hover:bg-blue-500/10 transition-all duration-200" title="Edit rule">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/>
                  </svg>
                </button>
                <button @click="deleteRule(r.id)"
                        class="w-7 h-7 inline-flex items-center justify-center rounded-lg text-slate-600 hover:text-red-400 hover:bg-red-500/10 transition-all duration-200" title="Delete rule">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/>
                  </svg>
                </button>
              </div>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>

</section>
