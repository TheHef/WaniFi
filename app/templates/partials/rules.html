<section x-show="tab === 'rules'">
  <!-- Add rule -->
  <div class="bg-slate-900 border border-slate-700/60 rounded-2xl p-5 mb-4">
    <h2 class="text-base font-semibold text-slate-200 mb-4">Add rule</h2>

    <div class="flex gap-2 mb-4">
      <button x-show="integrations.host_command"
              @click="newRule.rule_type = 'host_command'"
              class="px-4 py-1.5 rounded-lg text-xs font-semibold border transition"
              :class="newRule.rule_type === 'host_command' ? 'bg-red-500/20 border-red-500/50 text-red-300' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        Host Command
      </button>
      <button x-show="integrations.docker"
              @click="newRule.rule_type = 'docker'"
              class="px-4 py-1.5 rounded-lg text-xs font-semibold border transition"
              :class="newRule.rule_type === 'docker' ? 'bg-[#248CEF]/20 border-[#248CEF]/50 text-[#248CEF]' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        Docker Container
      </button>
      <button x-show="integrations.qb"
              @click="newRule.rule_type = 'qbittorrent'; newRule.action = 'alt_speed_on'; newRule.container = ''"
              class="px-4 py-1.5 rounded-lg text-xs font-semibold border transition"
              :class="newRule.rule_type === 'qbittorrent' ? 'bg-[#65A5E9]/20 border-[#65A5E9]/50 text-[#65A5E9]' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        qBittorrent
      </button>
      <button x-show="integrations.emby"
              @click="newRule.rule_type = 'emby'; newRule.action = 'set_bitrate_limit'; newRule.container = ''"
              class="px-4 py-1.5 rounded-lg text-xs font-semibold border transition"
              :class="newRule.rule_type === 'emby' ? 'bg-[#52B54B]/20 border-[#52B54B]/50 text-[#52B54B]' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        Emby
      </button>
      <button x-show="integrations.jellyfin"
              @click="newRule.rule_type = 'jellyfin'; newRule.action = 'set_bitrate_limit'; newRule.container = ''"
              class="px-4 py-1.5 rounded-lg text-xs font-semibold border transition"
              :class="newRule.rule_type === 'jellyfin' ? 'bg-[#AA5CC3]/20 border-[#AA5CC3]/50 text-[#AA5CC3]' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        Jellyfin
      </button>
      <button x-show="integrations.plex"
              @click="newRule.rule_type = 'plex'; newRule.action = 'set_wan_bitrate'; newRule.container = ''"
              class="px-4 py-1.5 rounded-lg text-xs font-semibold border transition"
              :class="newRule.rule_type === 'plex' ? 'bg-[#E5A00D]/20 border-[#E5A00D]/50 text-[#E5A00D]' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        Plex
      </button>
    </div>

    <!-- Docker form -->
    <div x-show="newRule.rule_type === 'docker'" class="grid md:grid-cols-4 gap-3">
      <select x-model="newRule.container" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-[#248CEF]">
        <option value="">— select container —</option>
        <template x-for="c in containers" :key="c.name">
          <option :value="c.name" x-text="c.name + ' (' + c.status + ')'"></option>
        </template>
      </select>
      <select x-model="newRule.trigger" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-[#248CEF]">
        <option value="failover">On failover</option>
        <option value="restored">On restored</option>
        <option value="down">On WAN down</option>
        <option value="high_latency">On high latency</option>
      </select>
      <select x-model="newRule.action" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-[#248CEF]">
        <option value="stop">Stop container</option>
        <option value="start">Start container</option>
        <option value="restart">Restart container</option>
        <option value="pause">Pause container</option>
        <option value="unpause">Unpause container</option>
      </select>
      <input x-model="newRule.name" type="text" :placeholder="newRule.container || 'Name (optional)'"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-[#248CEF] transition">
      <button @click="addRule()" class="md:col-span-4 bg-[#248CEF] hover:bg-[#248CEF]/80 text-white font-semibold rounded-xl px-4 py-2 text-sm transition">Add rule</button>
    </div>

    <!-- Host command form -->
    <div x-show="newRule.rule_type === 'host_command'" class="grid md:grid-cols-4 gap-3">
      <select x-model="newRule.trigger" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-red-500">
        <option value="failover">On failover</option>
        <option value="restored">On restored</option>
        <option value="down">On WAN down</option>
        <option value="high_latency">On high latency</option>
      </select>
      <input x-model="newRule.command" type="text" placeholder="e.g. systemctl restart myservice"
             class="md:col-span-2 bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm font-mono text-slate-200 placeholder-slate-600 focus:outline-none focus:border-red-500 transition">
      <input x-model="newRule.name" type="text" :placeholder="newRule.command || 'Name (optional)'"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-red-500 transition">
      <button @click="addRule()" class="md:col-span-4 bg-red-600 hover:bg-red-500 text-white font-semibold rounded-xl px-4 py-2 text-sm transition">Add rule</button>
    </div>

    <!-- Emby form -->
    <div x-show="newRule.rule_type === 'emby'" class="grid md:grid-cols-4 gap-3">
      <select x-model="newRule.trigger" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-[#52B54B]">
        <option value="failover">On failover</option>
        <option value="restored">On restored</option>
        <option value="down">On WAN down</option>
        <option value="high_latency">On high latency</option>
      </select>
      <select x-model="newRule.action" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-[#52B54B]">
        <option value="set_bitrate_limit">Set bitrate limit</option>
        <option value="clear_bitrate_limit">Clear bitrate limit</option>
        <option value="stop_all_sessions">Stop all sessions</option>
      </select>
      <input x-show="newRule.action === 'set_bitrate_limit'"
             x-model="newRule.container" type="number" min="1" placeholder="Mbps (e.g. 2)"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-[#52B54B] transition">
      <input x-model="newRule.name" type="text" placeholder="Name (optional)"
             :class="newRule.action === 'set_bitrate_limit' ? '' : 'md:col-span-2'"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-[#52B54B] transition">
      <button @click="addRule()" class="md:col-span-4 bg-[#52B54B] hover:bg-[#52B54B]/80 text-white font-semibold rounded-xl px-4 py-2 text-sm transition">Add rule</button>
    </div>

    <!-- Jellyfin form -->
    <div x-show="newRule.rule_type === 'jellyfin'" class="grid md:grid-cols-4 gap-3">
      <select x-model="newRule.trigger" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-[#AA5CC3]">
        <option value="failover">On failover</option>
        <option value="restored">On restored</option>
        <option value="down">On WAN down</option>
        <option value="high_latency">On high latency</option>
      </select>
      <select x-model="newRule.action" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-[#AA5CC3]">
        <option value="set_bitrate_limit">Set bitrate limit</option>
        <option value="clear_bitrate_limit">Clear bitrate limit</option>
        <option value="stop_all_sessions">Stop all sessions</option>
      </select>
      <input x-show="newRule.action === 'set_bitrate_limit'"
             x-model="newRule.container" type="number" min="1" placeholder="Mbps (e.g. 2)"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-[#AA5CC3] transition">
      <input x-model="newRule.name" type="text" placeholder="Name (optional)"
             :class="newRule.action === 'set_bitrate_limit' ? '' : 'md:col-span-2'"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-[#AA5CC3] transition">
      <button @click="addRule()" class="md:col-span-4 bg-[#AA5CC3] hover:bg-[#AA5CC3]/80 text-white font-semibold rounded-xl px-4 py-2 text-sm transition">Add rule</button>
    </div>

    <!-- Plex form -->
    <div x-show="newRule.rule_type === 'plex'" class="grid md:grid-cols-4 gap-3">
      <select x-model="newRule.trigger" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-[#E5A00D]">
        <option value="failover">On failover</option>
        <option value="restored">On restored</option>
        <option value="down">On WAN down</option>
        <option value="high_latency">On high latency</option>
      </select>
      <select x-model="newRule.action" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-[#E5A00D]">
        <option value="set_wan_bitrate">Set bitrate limit</option>
        <option value="clear_wan_bitrate">Clear bitrate limit</option>
        <option value="stop_all_streams">Stop all streams</option>
      </select>
      <input x-show="newRule.action === 'set_wan_bitrate'"
             x-model="newRule.container" type="number" min="1" placeholder="Mbps (e.g. 2)"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-[#E5A00D] transition">
      <input x-model="newRule.name" type="text" placeholder="Name (optional)"
             :class="newRule.action === 'set_wan_bitrate' ? '' : 'md:col-span-2'"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-[#E5A00D] transition">
      <button @click="addRule()" class="md:col-span-4 bg-[#E5A00D] hover:bg-[#E5A00D]/80 text-white font-semibold rounded-xl px-4 py-2 text-sm transition">Add rule</button>
    </div>

    <!-- qBittorrent form -->
    <div x-show="newRule.rule_type === 'qbittorrent'" class="grid md:grid-cols-4 gap-3">
      <select x-model="newRule.trigger" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-[#65A5E9]">
        <option value="failover">On failover</option>
        <option value="restored">On restored</option>
        <option value="down">On WAN down</option>
        <option value="high_latency">On high latency</option>
      </select>
      <select x-model="newRule.action" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-[#65A5E9]">
        <option value="alt_speed_on">Enable alt speed</option>
        <option value="alt_speed_off">Disable alt speed</option>
        <option value="set_dl_limit">Set download limit</option>
        <option value="set_ul_limit">Set upload limit</option>
        <option value="pause_all">Pause all torrents</option>
        <option value="resume_all">Resume all torrents</option>
      </select>
      <input x-show="newRule.action === 'set_dl_limit' || newRule.action === 'set_ul_limit'"
             x-model="newRule.container" type="number" min="0" placeholder="Speed KB/s (0 = unlimited)"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-[#65A5E9] transition">
      <input x-model="newRule.name" type="text" placeholder="Name (optional)"
             :class="(newRule.action === 'set_dl_limit' || newRule.action === 'set_ul_limit') ? '' : 'md:col-span-2'"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-[#65A5E9] transition">
      <button @click="addRule()" class="md:col-span-4 bg-[#65A5E9] hover:bg-[#65A5E9]/80 text-white font-semibold rounded-xl px-4 py-2 text-sm transition">Add rule</button>
    </div>
  </div>

  <!-- Rules table -->
  <div class="bg-slate-900 border border-slate-700/60 rounded-2xl overflow-hidden mb-4">
    <table class="w-full text-sm">
      <thead class="text-xs font-semibold text-slate-500 uppercase tracking-wider bg-slate-950/50">
        <tr>
          <th class="text-left pl-4 pr-2 py-3">Type</th>
          <th class="text-left pl-4 pr-5 py-3 border-l border-slate-800">Rule</th>
          <th class="text-left px-4 py-3 border-l border-slate-800">Trigger</th>
          <th class="text-left px-4 py-3 border-l border-slate-800">Action</th>
          <th class="text-center px-4 py-3 border-l border-slate-800">Enabled</th>
          <th class="text-center px-4 py-3 border-l border-slate-800">Run</th>
          <th class="text-center px-4 py-3 border-l border-slate-800">Edit</th>
          <th class="text-center px-4 py-3 border-l border-slate-800">Delete</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="r in rules" :key="r.id">
          <tr class="border-t border-slate-800">
            <td class="pl-4 pr-3 py-3">
              <span class="inline-block px-2 py-0.5 rounded text-xs font-bold whitespace-nowrap"
                    :style="({'host_command':'background:rgba(239,68,68,.18);color:#f87171','docker':'background:rgba(36,140,239,.18);color:#248CEF','qbittorrent':'background:rgba(101,165,233,.18);color:#65A5E9','emby':'background:rgba(82,181,75,.18);color:#52B54B','jellyfin':'background:rgba(170,92,195,.18);color:#AA5CC3','plex':'background:rgba(229,160,13,.18);color:#E5A00D'})[r.rule_type] || 'background:rgba(71,85,105,.5);color:#94a3b8'"
                    x-text="r.rule_type === 'host_command' ? 'HC' : r.rule_type === 'docker' ? 'DC' : r.rule_type === 'qbittorrent' ? 'qb' : r.rule_type === 'emby' ? 'Emby' : r.rule_type === 'jellyfin' ? 'Jellyfin' : r.rule_type === 'plex' ? 'Plex' : r.rule_type">
              </span>
            </td>
            <td class="pl-4 pr-5 py-3 border-l border-slate-800">
              <div class="text-sm font-medium text-slate-100"
                   x-text="r.name || (r.rule_type === 'host_command' ? r.command : r.rule_type === 'qbittorrent' ? ('qB: ' + r.action) : r.rule_type === 'emby' ? ('Emby: ' + r.action) : r.rule_type === 'jellyfin' ? ('Jellyfin: ' + r.action) : r.rule_type === 'plex' ? ('Plex: ' + r.action) : r.container)"></div>
              <div class="text-xs text-slate-500 font-mono mt-0.5"
                   x-show="r.name"
                   x-text="r.rule_type === 'host_command' ? r.command : r.rule_type === 'qbittorrent' ? r.action : r.rule_type === 'emby' ? r.action : r.rule_type === 'jellyfin' ? r.action : r.rule_type === 'plex' ? r.action : r.container"></div>
            </td>
            <td class="px-4 py-3 text-slate-400 text-sm border-l border-slate-800"
                x-text="({failover:'→ On failover', restored:'→ On restored', down:'→ On WAN down', high_latency:'→ On high latency'})[r.trigger] || ('→ ' + r.trigger)"></td>
            <td class="px-4 py-3 text-slate-400 text-sm border-l border-slate-800"
                x-text="r.rule_type === 'host_command' ? 'run' : r.rule_type === 'qbittorrent' ? ({alt_speed_on:'turtle on', alt_speed_off:'turtle off', set_dl_limit:'dl limit', set_ul_limit:'ul limit', pause_all:'pause all', resume_all:'resume all'})[r.action] || r.action : r.rule_type === 'emby' ? ({set_bitrate_limit: r.container ? r.container+' Mbps limit' : 'set limit', clear_bitrate_limit:'unlimited', stop_all_sessions:'stop sessions'})[r.action] || r.action : r.rule_type === 'jellyfin' ? ({set_bitrate_limit: r.container ? r.container+' Mbps limit' : 'set limit', clear_bitrate_limit:'unlimited', stop_all_sessions:'stop sessions'})[r.action] || r.action : r.rule_type === 'plex' ? ({set_wan_bitrate: r.container ? r.container+' Mbps WAN limit' : 'set WAN limit', clear_wan_bitrate:'unlimited WAN', stop_all_streams:'stop streams'})[r.action] || r.action : r.action"></td>
            <td class="px-4 py-3 border-l border-slate-800 text-center">
              <button @click="toggleRule(r.id)"
                      class="relative w-8 h-[18px] rounded-full transition-colors duration-200 focus:outline-none shrink-0"
                      :class="r.enabled ? 'bg-emerald-500' : 'bg-slate-700'">
                <span class="absolute top-[2px] w-[14px] h-[14px] rounded-full bg-white shadow-sm flex items-center justify-center transition-all duration-200"
                      :class="r.enabled ? 'left-[16px]' : 'left-[2px]'">
                  <svg x-show="r.enabled" class="w-2 h-2 text-emerald-500" viewBox="0 0 10 8" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 4l2.5 2.5L9 1"/>
                  </svg>
                  <svg x-show="!r.enabled" class="w-1.5 h-1.5 text-slate-400" viewBox="0 0 8 8" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <path d="M1 1l6 6M7 1L1 7"/>
                  </svg>
                </span>
              </button>
            </td>
            <td class="px-4 py-3 border-l border-slate-800 text-center">
              <button @click="runRule(r.id)"
                      :title="runMsg && runMsg.id === r.id ? runMsg.text : 'Run now'"
                      :class="runMsg && runMsg.id === r.id
                        ? (runMsg.ok ? 'text-emerald-400 bg-emerald-500/15' : 'text-red-400 bg-red-500/15')
                        : 'text-slate-600 hover:text-emerald-400 hover:bg-emerald-500/10'"
                      class="w-7 h-7 inline-flex items-center justify-center rounded-lg transition-all duration-300">
                <!-- idle: play -->
                <svg x-show="!runMsg || runMsg.id !== r.id" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/>
                </svg>
                <!-- success: checkmark -->
                <svg x-show="runMsg && runMsg.id === r.id && runMsg.ok" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                </svg>
                <!-- failure: x -->
                <svg x-show="runMsg && runMsg.id === r.id && !runMsg.ok" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                </svg>
              </button>
            </td>
            <td class="px-4 py-3 border-l border-slate-800 text-center">
              <button @click="editRule(r.id)" class="w-7 h-7 inline-flex items-center justify-center rounded-lg text-slate-600 hover:text-blue-400 hover:bg-blue-500/10 transition" title="Edit rule">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/>
                </svg>
              </button>
            </td>
            <td class="px-4 py-3 border-l border-slate-800 text-center">
              <button @click="deleteRule(r.id)" class="w-7 h-7 inline-flex items-center justify-center rounded-lg text-slate-600 hover:text-red-400 hover:bg-red-500/10 transition" title="Delete rule">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                </svg>
              </button>
            </td>
          </tr>
        </template>
        <tr x-show="rules.length === 0">
          <td colspan="7" class="px-5 py-8 text-center text-slate-600">No rules yet</td>
        </tr>
      </tbody>
    </table>
  </div>

</section>
