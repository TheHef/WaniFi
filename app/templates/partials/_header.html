<header class="border-b border-slate-800 bg-slate-900 sticky top-0 z-30">
  <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3.5 cursor-pointer" @click="tab = 'dashboard'">
      <div class="w-12 h-12 rounded-xl overflow-hidden shrink-0">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="36" height="36" rx="9" fill="#1e3a5f"/>
          <rect width="36" height="36" rx="9" fill="url(#hlg)"/>
          <text x="18" y="26" font-family="Arial Black, sans-serif" font-size="21" font-weight="900" fill="white" text-anchor="middle" opacity="0.95">W</text>
          <defs>
            <linearGradient id="hlg" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#1d4ed8"/>
              <stop offset="100%" stop-color="#0ea5e9"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div>
        <h1 class="text-xl font-bold leading-tight tracking-tight flex items-center gap-2">WaniFi
          <span class="text-[10px] font-semibold bg-slate-800 border border-slate-700 text-slate-500 px-1.5 py-0.5 rounded-md tracking-wide">v{{ version }}</span>
        </h1>
        <p class="text-sm text-slate-400 mt-0.5">Failover handled.</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <div class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 flex items-center gap-2 whitespace-nowrap">
        <span class="text-xs text-slate-500 uppercase tracking-wider leading-none">Active WAN</span>
        <span class="text-sm font-bold leading-none" :class="{
            'text-emerald-400': status.active_wan === 'primary',
            'text-amber-400':   status.active_wan === 'failover',
            'text-red-400':     status.active_wan === 'down' || status.active_wan === null,
          }"
          x-text="status.active_wan === 'primary' ? (status.primary_wan_name || status.primary_wan)
                : status.active_wan === 'failover' ? (status.failover_wan_name || status.failover_wan)
                : (status.active_wan || '—')"></span>
      </div>
      <button @click="prevTab = (tab !== 'settings' ? tab : prevTab); tab = 'settings'; settingsSection = 'router'" title="Settings"
              class="inline-flex items-center bg-slate-800 border rounded-lg px-2.5 py-1.5 transition text-slate-400 hover:text-white hover:border-slate-500"
              :class="tab === 'settings' ? 'border-blue-500 text-blue-400' : 'border-slate-700'">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <form method="post" action="/logout">
        <button type="submit" title="Log out" class="inline-flex items-center text-red-400 bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 hover:border-red-500/50 px-2.5 py-1.5 rounded-lg transition">
          <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
          </svg>
        </button>
      </form>
    </div>
  </div>
  <div class="max-w-6xl mx-auto px-4 flex items-center gap-1 border-t border-slate-800/60">

    <!-- Main navigation (Overview / Rules / Log) -->
    <template x-if="tab !== 'settings'">
      <div class="flex items-center">
        <template x-for="t in [['dashboard','Overview'],['rules','Rules'],['events','Log']]" :key="t[0]">
          <button @click="tab = t[0]"
                  class="px-4 py-3 text-sm font-medium border-b-2 transition"
                  :class="tab === t[0] ? 'border-blue-500 text-blue-500' : 'border-transparent text-slate-500 hover:text-blue-400'"
                  x-text="t[1]"></button>
        </template>
      </div>
    </template>

    <!-- Settings sub-navigation -->
    <template x-if="tab === 'settings'">
      <div class="flex items-center">
        <button @click="tab = 'dashboard'; settingsSection = 'router'"
                class="flex items-center gap-1.5 px-3 py-3 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-300 transition">
          <svg class="w-3.5 h-3.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
          Back
        </button>
        <div class="w-px h-4 bg-slate-700 mx-1 self-center"></div>
        <template x-for="s in [['router','Router'],['apis','APIs'],['agents','Agents'],['backup','Backup']]" :key="s[0]">
          <button @click="settingsSection = s[0]"
                  class="px-4 py-3 text-sm font-medium border-b-2 transition"
                  :class="settingsSection === s[0] ? 'border-blue-500 text-blue-500' : 'border-transparent text-slate-500 hover:text-blue-400'"
                  x-text="s[1]"></button>
        </template>
      </div>
    </template>

    <div class="ml-auto flex items-center gap-3 py-2 pr-1">
      <template x-if="status.docker_ok">
        <span class="text-xs font-medium text-emerald-400">Docker Connected</span>
      </template>
      <template x-if="status.docker_ok">
        <span class="text-slate-700">|</span>
      </template>
      <span class="text-xs font-medium"
            :class="liveConnected ? 'text-emerald-400' : status.controller_offline ? 'text-amber-400' : 'text-red-400'"
            x-text="liveConnected
              ? (settings.router_type === 'unifi' ? 'UniFi Connected' : 'OpenWrt Connected')
              : status.controller_offline ? 'Controller offline'
              : 'Router not connected'"></span>
      <template x-if="versionStatus !== null && versionStatus.up_to_date !== null">
        <span class="text-slate-700">|</span>
      </template>
      <template x-if="versionStatus !== null && versionStatus.up_to_date !== null">
        <span class="inline-flex items-center gap-1 text-xs font-medium"
              :class="versionStatus.up_to_date ? 'text-emerald-400' : 'text-red-400'"
              :title="versionStatus.up_to_date ? 'Running latest' : ('Running: ' + (versionStatus.current || '?') + '  Latest: ' + (versionStatus.latest || '?'))">
          <span x-text="versionStatus.up_to_date ? 'Up to date ✓' : 'UPDATE AVAILABLE'"></span>
          <template x-if="!versionStatus.up_to_date">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </template>
        </span>
      </template>
    </div>
  </div>
</header>
