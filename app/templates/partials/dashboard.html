<section x-show="tab === 'dashboard'">

  <!-- Top status cards -->
  <div class="grid md:grid-cols-3 gap-4 mb-6">
    <div class="bg-slate-900 border border-slate-700/60 rounded-2xl p-5 relative overflow-hidden">
      <div class="absolute top-0 left-0 right-0 h-0.5 rounded-t-2xl"
           :class="status.active_wan === 'primary' ? 'bg-emerald-500' : status.active_wan === 'failover' ? 'bg-amber-500' : 'bg-red-500'"></div>
      <div class="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-2">Status</div>
      <div class="text-3xl font-black tracking-tight" :class="{
            'text-emerald-400': status.active_wan === 'primary',
            'text-amber-400':   status.active_wan === 'failover',
            'text-red-400':     status.active_wan === 'down',
            'text-slate-600':   !status.active_wan,
          }">
        <span x-show="status.active_wan === 'primary'">✓ <span x-text="status.primary_wan_name || 'Primary'"></span></span>
        <span x-show="status.active_wan === 'failover'">⚠ <span x-text="status.failover_wan_name || 'Failover'"></span></span>
        <span x-show="status.active_wan === 'down'">✗ Down</span>
        <span x-show="!status.active_wan">—</span>
      </div>
      <div class="font-mono text-sm text-slate-300 mt-1.5" x-show="(liveStats||{}).active_wan_ip" x-text="(liveStats||{}).active_wan_ip"></div>
      <div class="text-xs text-slate-500 mt-1" x-text="status.last_check ? 'Last checked: ' + new Date(status.last_check).toLocaleString() : 'Waiting…'"></div>
    </div>

    <div class="bg-slate-900 border border-slate-700/60 rounded-2xl p-5">
      <div class="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-3">Connections</div>
      <div class="space-y-1.5 text-sm">
        <div class="flex justify-between items-center">
          <span class="text-slate-400">Primary</span>
          <span class="text-emerald-400 font-medium" x-text="status.primary_wan_name || status.primary_wan || '—'"></span>
        </div>
        <div class="flex justify-between items-center">
          <span class="text-slate-400">Failover</span>
          <span class="text-amber-400 font-medium" x-text="status.failover_wan_name || status.failover_wan || '—'"></span>
        </div>
      </div>
    </div>

    <div class="bg-slate-900 border border-slate-700/60 rounded-2xl p-5">
      <div class="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-3">Info</div>
      <template x-if="status.last_error">
        <div class="text-sm text-red-400 break-words leading-relaxed" x-text="status.last_error"></div>
      </template>
      <template x-if="!status.last_error && status.state_changed_at && status.active_wan === 'failover'">
        <div>
          <div class="text-sm font-semibold text-amber-400">Primary WAN down</div>
          <div class="text-xs text-slate-400 mt-1">Running on failover since:</div>
          <div class="text-xs text-slate-300 font-mono mt-0.5" x-text="new Date(status.state_changed_at).toLocaleString()"></div>
        </div>
      </template>
      <template x-if="!status.last_error && status.state_changed_at && status.active_wan === 'primary'">
        <div>
          <div class="text-sm font-semibold text-emerald-400">Primary WAN active</div>
          <div class="text-xs text-slate-400 mt-1">Since:</div>
          <div class="text-xs text-slate-300 font-mono mt-0.5" x-text="new Date(status.state_changed_at).toLocaleString()"></div>
        </div>
      </template>
      <template x-if="!status.last_error && !status.state_changed_at">
        <div class="text-sm text-slate-600">No events yet</div>
      </template>
    </div>
  </div>

  <!-- WAN cards -->
  <h2 class="text-base font-semibold text-slate-200 mb-3">WAN Connections</h2>
  <div class="grid md:grid-cols-2 gap-4">

    <!-- Primary WAN -->
    <div class="bg-slate-900 border rounded-2xl relative overflow-hidden transition-all flex flex-col"
         :class="status.active_wan === 'primary' ? 'border-emerald-500/40' : 'border-slate-700/60'">
      <div class="absolute top-0 left-0 right-0 h-0.5 rounded-t-2xl transition-all"
           :class="status.active_wan === 'primary' ? 'bg-emerald-500' : 'bg-slate-700'"></div>

      <!-- Header -->
      <div class="px-5 pt-5 pb-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="text-lg font-bold text-emerald-400" x-text="status.primary_wan_name || 'Primary WAN'"></div>
          <span class="font-mono text-xs bg-slate-800 border border-slate-700 text-slate-400 px-2 py-0.5 rounded-md" x-text="status.primary_wan"></span>
        </div>
        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold"
              :class="status.active_wan === 'primary' ? 'bg-emerald-500/20 text-emerald-300' : 'bg-red-500/20 text-red-400'">
          <span class="w-1.5 h-1.5 rounded-full animate-pulse" :class="status.active_wan === 'primary' ? 'bg-emerald-400' : 'bg-red-400'"></span>
          <span x-text="status.active_wan === 'primary' ? 'Active' : 'Offline'"></span>
        </span>
      </div>

      <!-- Body -->
      <div class="flex flex-1"
           x-data="{ get pw() { return (status.raw_wans||[]).find(w=>w.subsystem===status.primary_wan) || {}; } }">
        <!-- Device column -->
        <div class="flex flex-col items-center justify-center shrink-0 w-24 border-r border-slate-800 py-4 gap-2">
          <img x-show="deviceIcon((liveStats||{}).gw_model)"
               :src="deviceIcon((liveStats||{}).gw_model)"
               class="w-14 h-14 object-contain" :alt="(liveStats||{}).gw_model">
          <div class="w-14 h-14" x-show="!(liveStats||{}).gw_model || !deviceIcon((liveStats||{}).gw_model)"></div>
          <span class="text-xs font-semibold text-slate-500 text-center leading-tight px-2"
                x-show="(liveStats||{}).gw_model"
                x-text="fmtModel((liveStats||{}).gw_model) || (liveStats||{}).gw_model"></span>
        </div>
        <!-- Stat rows -->
        <div class="flex-1 min-w-0 divide-y divide-slate-800/60 px-4 py-1 self-center">
          <div class="flex items-center justify-between py-1.5 gap-4">
            <span class="text-xs font-semibold uppercase tracking-wider text-slate-500 shrink-0">WAN IP</span>
            <span class="font-mono text-sm truncate text-right" :class="status.active_wan === 'primary' ? 'text-slate-100' : 'text-slate-600'"
                  x-text="(status.active_wan === 'primary' ? (liveStats||{}).active_wan_ip : null) || pw.wan_ip || '—'"></span>
          </div>
          <div class="flex items-center justify-between py-1.5 gap-4">
            <span class="text-xs font-semibold uppercase tracking-wider text-slate-500 shrink-0">Device IP</span>
            <span class="font-mono text-sm truncate text-right" :class="status.active_wan === 'primary' ? 'text-slate-100' : 'text-slate-600'"
                  x-text="(liveStats||{}).gw_ip || '—'"></span>
          </div>
          <div class="flex items-center justify-between py-1.5 gap-4" x-show="pw.isp_name">
            <span class="text-xs font-semibold uppercase tracking-wider text-slate-500 shrink-0">ISP</span>
            <span class="text-sm truncate text-right" :class="status.active_wan === 'primary' ? 'text-slate-100' : 'text-slate-600'"
                  x-text="pw.isp_name"></span>
          </div>
          <div class="flex items-center justify-between py-1.5 gap-4">
            <span class="text-xs font-semibold uppercase tracking-wider text-slate-500 shrink-0">Latency</span>
            <span class="font-mono text-sm" :class="status.active_wan === 'primary' ? 'text-slate-100' : 'text-slate-600'"
                  x-text="status.active_wan === 'primary' && (liveStats||{}).active_wan_latency ? (liveStats||{}).active_wan_latency + ' ms' : '—'"></span>
          </div>
          <div class="flex items-center justify-between py-1.5 gap-4">
            <span class="text-xs font-semibold uppercase tracking-wider text-slate-500 shrink-0">Active for</span>
            <span class="text-sm" :class="status.active_wan === 'primary' ? 'text-slate-100' : 'text-slate-600'"
                  x-text="status.active_wan === 'primary' ? fmtSince(status.state_changed_at) : '—'"></span>
          </div>
        </div>
      </div>

      <!-- Bottom strip -->
      <div class="border-t border-slate-800 px-5 py-3 flex items-center gap-5 mt-auto"
           x-show="(liveStats||{}).active_wan_rx_mbps != null || (liveStats||{}).gw_cpu != null">
        <!-- Throughput -->
        <div class="flex items-center gap-3 shrink-0" x-show="(liveStats||{}).active_wan_rx_mbps != null">
          <span class="flex items-center gap-1 font-mono text-sm font-bold text-emerald-400">
            <span class="text-slate-600 text-xs">↓</span>
            <span x-text="fmtSpeed(status.active_wan === 'primary' ? (liveStats||{}).active_wan_rx_mbps : 0)"></span>
          </span>
          <span class="flex items-center gap-1 font-mono text-sm font-bold text-sky-400">
            <span class="text-slate-600 text-xs">↑</span>
            <span x-text="fmtSpeed(status.active_wan === 'primary' ? (liveStats||{}).active_wan_tx_mbps : 0)"></span>
          </span>
        </div>
        <div class="w-px h-5 bg-slate-800 shrink-0"
             x-show="(liveStats||{}).active_wan_rx_mbps != null && ((liveStats||{}).gw_cpu != null || (liveStats||{}).gw_mem != null)"></div>
        <!-- CPU -->
        <div class="flex-1 min-w-0" x-show="(liveStats||{}).gw_cpu != null">
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">CPU</span>
            <span class="font-mono text-xs font-semibold"
                  :class="(liveStats||{}).gw_cpu > 80 ? 'text-red-400' : (liveStats||{}).gw_cpu > 50 ? 'text-amber-400' : 'text-slate-400'"
                  x-text="(liveStats||{}).gw_cpu + '%'"></span>
          </div>
          <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full rounded-full transition-all duration-500"
                 :style="`width: ${Math.min((liveStats||{}).gw_cpu, 100)}%`"
                 :class="(liveStats||{}).gw_cpu > 80 ? 'bg-red-400' : (liveStats||{}).gw_cpu > 50 ? 'bg-amber-400' : 'bg-slate-500'"></div>
          </div>
        </div>
        <!-- RAM -->
        <div class="flex-1 min-w-0" x-show="(liveStats||{}).gw_mem != null">
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">RAM</span>
            <span class="font-mono text-xs font-semibold"
                  :class="(liveStats||{}).gw_mem > 85 ? 'text-red-400' : (liveStats||{}).gw_mem > 65 ? 'text-amber-400' : 'text-slate-400'"
                  x-text="(liveStats||{}).gw_mem + '%'"></span>
          </div>
          <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full rounded-full transition-all duration-500"
                 :style="`width: ${Math.min((liveStats||{}).gw_mem, 100)}%`"
                 :class="(liveStats||{}).gw_mem > 85 ? 'bg-red-400' : (liveStats||{}).gw_mem > 65 ? 'bg-amber-400' : 'bg-slate-500'"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Failover WAN -->
    <div class="bg-slate-900 border rounded-2xl relative overflow-hidden transition-all flex flex-col"
         x-data="{ get xdev() { return ((liveStats||{}).extra_devices||[])[0] || {}; }, get fw() { return (status.raw_wans||[]).find(w=>w.subsystem===status.failover_wan) || {}; } }"
         :class="status.active_wan === 'failover' ? 'border-amber-500/40' : 'border-slate-700/60'">
      <div class="absolute top-0 left-0 right-0 h-0.5 rounded-t-2xl transition-all"
           :class="status.active_wan === 'failover' ? 'bg-amber-500' : 'bg-slate-700'"></div>

      <!-- Header -->
      <div class="px-5 pt-5 pb-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="text-lg font-bold text-amber-400" x-text="status.failover_wan_name || 'Failover WAN'"></div>
          <span class="font-mono text-xs bg-slate-800 border border-slate-700 text-slate-400 px-2 py-0.5 rounded-md" x-text="status.failover_wan"></span>
        </div>
        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold"
              :class="status.active_wan === 'failover' ? 'bg-amber-500/20 text-amber-300' : 'bg-amber-500/10 text-amber-500/60'">
          <span class="w-1.5 h-1.5 rounded-full bg-amber-400" :class="status.active_wan === 'failover' ? 'animate-pulse' : 'opacity-40'"></span>
          <span x-text="status.active_wan === 'failover' ? 'Active' : 'Standby'"></span>
        </span>
      </div>

      <!-- Body -->
      <div class="flex flex-1">
        <!-- Device column -->
        <div class="flex flex-col items-center justify-center shrink-0 w-24 border-r border-slate-800 py-4 gap-2">
          <img x-show="((liveStats||{}).extra_devices||[]).length > 0 && (deviceIcon(xdev.model) || deviceIcon(xdev.name))"
               :src="deviceIcon(xdev.model) || deviceIcon(xdev.name)"
               class="w-14 h-14 object-contain" alt="device">
          <div class="w-14 h-14"
               x-show="!(((liveStats||{}).extra_devices||[]).length > 0 && (deviceIcon(xdev.model) || deviceIcon(xdev.name)))"></div>
          <span class="text-xs font-semibold text-slate-500 text-center leading-tight px-2"
                x-show="xdev.model || xdev.name"
                x-text="fmtModel(xdev.model) || fmtModel(xdev.name) || xdev.model || xdev.name"></span>
        </div>
        <!-- Stat rows -->
        <div class="flex-1 min-w-0 divide-y divide-slate-800/60 px-4 py-1 self-center">
          <div class="flex items-center justify-between py-1.5 gap-4">
            <span class="text-xs font-semibold uppercase tracking-wider text-slate-500 shrink-0">WAN IP</span>
            <span class="font-mono text-sm truncate text-right" :class="status.active_wan === 'failover' ? 'text-slate-100' : 'text-slate-600'"
                  x-text="(status.active_wan === 'failover' ? (liveStats||{}).active_wan_ip : null) || fw.wan_ip || xdev.wan_ip || '—'"></span>
          </div>
          <div class="flex items-center justify-between py-1.5 gap-4">
            <span class="text-xs font-semibold uppercase tracking-wider text-slate-500 shrink-0">Device IP</span>
            <span class="font-mono text-sm truncate text-right" :class="status.active_wan === 'failover' ? 'text-slate-100' : 'text-slate-600'"
                  x-text="xdev.ip || '—'"></span>
          </div>
          <div class="flex items-center justify-between py-1.5 gap-4" x-show="fw.isp_name || xdev.isp_name">
            <span class="text-xs font-semibold uppercase tracking-wider text-slate-500 shrink-0">ISP</span>
            <span class="text-sm truncate text-right" :class="status.active_wan === 'failover' ? 'text-slate-100' : 'text-slate-600'"
                  x-text="fw.isp_name || xdev.isp_name"></span>
          </div>
          <div class="flex items-center justify-between py-1.5 gap-4">
            <span class="text-xs font-semibold uppercase tracking-wider text-slate-500 shrink-0">Latency</span>
            <span class="font-mono text-sm" :class="status.active_wan === 'failover' ? 'text-slate-100' : 'text-slate-600'"
                  x-text="status.active_wan === 'failover' && (liveStats||{}).active_wan_latency ? (liveStats||{}).active_wan_latency + ' ms' : '—'"></span>
          </div>
          <div class="flex items-center justify-between py-1.5 gap-4">
            <span class="text-xs font-semibold uppercase tracking-wider text-slate-500 shrink-0">Active for</span>
            <span class="text-sm" :class="status.active_wan === 'failover' ? 'text-slate-100' : 'text-slate-600'"
                  x-text="status.active_wan === 'failover' ? fmtSince(status.state_changed_at) : '—'"></span>
          </div>
        </div>
      </div>

      <!-- Bottom strip -->
      <div class="border-t border-slate-800 px-5 py-3 flex items-center gap-5 mt-auto"
           x-show="(liveStats||{}).active_wan_rx_mbps != null || xdev.cpu != null || xdev.signal != null || xdev.rsrp != null">
        <!-- Throughput -->
        <div class="flex items-center gap-3 shrink-0" x-show="(liveStats||{}).active_wan_rx_mbps != null">
          <span class="flex items-center gap-1 font-mono text-sm font-bold"
                :class="status.active_wan === 'failover' ? 'text-emerald-400' : 'text-slate-600'">
            <span class="text-slate-600 text-xs">↓</span>
            <span x-text="status.active_wan === 'failover' ? fmtSpeed((liveStats||{}).active_wan_rx_mbps) : '0 Mbps'"></span>
          </span>
          <span class="flex items-center gap-1 font-mono text-sm font-bold"
                :class="status.active_wan === 'failover' ? 'text-sky-400' : 'text-slate-600'">
            <span class="text-slate-600 text-xs">↑</span>
            <span x-text="status.active_wan === 'failover' ? fmtSpeed((liveStats||{}).active_wan_tx_mbps) : '0 Mbps'"></span>
          </span>
        </div>
        <div class="w-px h-5 bg-slate-800 shrink-0"
             x-show="(liveStats||{}).active_wan_rx_mbps != null && (xdev.cpu != null || xdev.mem != null)"></div>
        <!-- CPU -->
        <div class="flex-1 min-w-0" x-show="xdev.cpu != null">
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">CPU</span>
            <span class="font-mono text-xs font-semibold"
                  :class="xdev.cpu > 80 ? 'text-red-400' : xdev.cpu > 50 ? 'text-amber-400' : 'text-slate-400'"
                  x-text="xdev.cpu + '%'"></span>
          </div>
          <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full rounded-full transition-all duration-500"
                 :style="`width: ${Math.min(xdev.cpu, 100)}%`"
                 :class="xdev.cpu > 80 ? 'bg-red-400' : xdev.cpu > 50 ? 'bg-amber-400' : 'bg-slate-500'"></div>
          </div>
        </div>
        <!-- RAM -->
        <div class="flex-1 min-w-0" x-show="xdev.mem != null">
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">RAM</span>
            <span class="font-mono text-xs font-semibold"
                  :class="xdev.mem > 85 ? 'text-red-400' : xdev.mem > 65 ? 'text-amber-400' : 'text-slate-400'"
                  x-text="xdev.mem + '%'"></span>
          </div>
          <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full rounded-full transition-all duration-500"
                 :style="`width: ${Math.min(xdev.mem, 100)}%`"
                 :class="xdev.mem > 85 ? 'bg-red-400' : xdev.mem > 65 ? 'bg-amber-400' : 'bg-slate-500'"></div>
          </div>
        </div>
        <!-- Signal -->
        <div class="flex items-center gap-2 shrink-0"
             x-show="xdev.signal != null || xdev.rsrp != null"
             x-data="{ get dbm() { return xdev.signal ?? xdev.rsrp; } }">
          <div class="w-px h-5 bg-slate-800"></div>
          <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">Signal</span>
          <span class="inline-flex items-end gap-px h-3.5" :class="signalColor(dbm)">
            <template x-for="i in 5" :key="i">
              <span class="w-0.5 rounded-sm"
                    :class="i <= signalBars(dbm) ? 'bg-current' : 'bg-slate-700'"
                    :style="'height: ' + (i*20) + '%'"></span>
            </template>
          </span>
          <span class="font-mono text-xs font-semibold" :class="signalColor(dbm)" x-text="dbm + ' dBm'"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- WAN metrics charts -->
  <div class="mt-6" x-data="metricsChart()">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-base font-semibold text-slate-200">WAN Metrics</h2>
      <div class="flex gap-1">
        <template x-for="r in ['1h','12h','1d','7d','30d']" :key="r">
          <button @click="setRange(r)"
                  class="px-2.5 py-1 rounded-lg text-xs font-semibold transition"
                  :class="range === r ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 hover:text-slate-200'"
                  x-text="r"></button>
        </template>
      </div>
    </div>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-slate-900 border border-slate-700/60 rounded-2xl p-4">
        <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Throughput</div>
        <div style="height:180px"><canvas id="chart-throughput"></canvas></div>
      </div>
      <div class="bg-slate-900 border border-slate-700/60 rounded-2xl p-4">
        <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Latency</div>
        <div style="height:180px"><canvas id="chart-latency"></canvas></div>
      </div>
    </div>
  </div>
</section>
